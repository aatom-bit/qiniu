<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Linux AI 助手</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            background: #1e1e1e;
            color: #ccc;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            flex: 0 0 auto;
            width: 240px;
            min-width: 220px;
            width: 220px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .new-chat-btn {
            padding: 12px;
            margin: 5px 10px;
            background: #2d2d2d;
            color: #aaa;
            text-align: center;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .new-chat-btn:hover {
            background: #444;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            font-size: 13px;
            border-bottom: 1px solid #2d2d2d;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: #2d2d2d;
        }

        .history-item-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .history-item-delete {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            margin-left: 8px;
            border-radius: 3px;
            transition: 0.2s;
            opacity: 0;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }

        .history-item-delete:hover {
            background: #e74c3c;
            color: #fff;
        }

        .history-item.active {
            background: #37373d;
            border-left: 3px solid #007acc;
            padding-left: 12px;
        }

        /* 对话区 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 300px;
        }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px;
            /* padding: 20px; */
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
            /* max-width: 90%; */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            font-size: 20px;
            margin: 0 12px;
        }

        .content {
            max-width: 80%;
            min-width: 50px;
        }

        .text-bubble {
            background: #333;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .text-bubble {
            background: #007acc;
            color: white;
        }

        /* 代码块样式 */
        .code-block {
            width: 100%;
            background: #000;
            border-radius: 6px;
            margin-top: 8px;
            border: 1px solid #444;
        }

        .code-header {
            background: #333;
            padding: 5px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .code-header button {
            background: #28a745;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        pre {
            padding: 12px;
            margin: 0;
            font-family: 'Fira Code', 'Courier New', monospace;
            overflow-x: auto;
            font-size: 13px;
            color: #d7ba7d;
        }

        .code-block pre {
            padding: 12px;
            margin: 0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            overflow-x: auto;
            /* 关键：代码过长时内部横向滚动 */
            white-space: pre;
            /* 保持代码原样，不换行以方便阅读 */
            color: #d7ba7d;
        }

        pre::-webkit-scrollbar {
            height: 8px;
        }

        pre::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        pre::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 输入区 */
        .input-area {
            min-width: 50px;
            padding: 20px;
            border-top: 1px solid #333;
            justify-content: center;
            /* 输入框居中 */
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            width: 100%;
            max-width: 80%;
            /* 与消息最大宽度对齐 */
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            height: 50px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            resize: none;
            outline: none;
            resize: vertical;
            /* 允许用户垂直拉伸输入框 */
        }

        #send-btn {
            width: 80px;
            background: #007acc;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #asr-btn {
            width: 50px;
            height: 50px;
            background: #555;
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }

        #asr-btn:hover:not(.recording) {
            background: #666;
        }

        #asr-btn.recording {
            background: #e74c3c;
            animation: asr-pulse 1s ease-in-out infinite;
        }

        @keyframes asr-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }
        }

        .action-btn {
            padding: 12px;
            margin: 5px 10px;
            background: #2d2d2d;
            color: #aaa;
            text-align: center;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #3d3d3d;
            color: #fff;
        }

        .action-btn.active {
            border-color: #ff9a6b;
            color: #ff9a6b;
        }

        /* 包管理器主视图 */
        .package-manager-view {
            display: none;
            /* 默认隐藏 */
            flex: 1;
            flex-direction: column;
            background: #1e1e1e;
        }

        .pkg-toolbar {
            padding: 10px 20px;
            background: #252526;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pkg-search-input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
        }

        .pkg-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pkg-list-container {
            flex: 1;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .pkg-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pkg-table th {
            text-align: left;
            padding: 8px 12px;
            background: #2d2d2d;
            position: sticky;
            top: 0;
        }

        .pkg-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #2d2d2d;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .pkg-table tr:hover {
            background: #2a2d2e;
        }

        .pkg-table tr.selected {
            background: #37373d;
            color: #007acc;
        }

        .pkg-detail-pane {
            flex: 0 0 300px;
            background: #1e1e1e;
            padding: 15px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }

        .pkg-detail-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .loading-overlay {
            color: #888;
            padding: 20px;
            text-align: center;
        }

        /* 筛选器容器 */
        .pkg-filter-tabs {
            display: flex;
            background: #252526;
            border-bottom: 1px solid #333;
            padding: 0 10px;
        }

        .pkg-tab {
            padding: 8px 15px;
            font-size: 12px;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
        }

        .pkg-tab.active {
            color: #fff;
            border-bottom-color: #007acc;
            background: #2d2d2d;
        }

        /* 操作按钮 */
        .pkg-action-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-install {
            background: #28a745;
            color: white;
        }

        .btn-install:hover {
            background: #218838;
        }

        .btn-remove {
            background: #dc3545;
            color: white;
        }

        .btn-remove:hover {
            background: #c82333;
        }

        /* 详情页的大按钮 */
        .pkg-detail-actions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .big-action-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 状态标记 */
        .status-tag {
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            background: #444;
            color: #aaa;
            margin-left: 8px;
        }

        .status-tag.installed {
            background: #0e639c;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <!-- 显示/关闭悬浮球按钮 -->
            <div class="action-btn" id="toggle-ball-btn">显示悬浮球</div>

            <div class="action-btn" id="show-chat-btn">💬 AI 对话</div>
            <div class="action-btn" id="show-pkg-btn">📦 包管理</div>

            <div id="chat-sidebar-parts">
                <div class="new-chat-btn" id="new-chat-btn">+ 新对话</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>

        <!-- AI对话视图 -->
        <div class="main-chat" id="main-chat-view">
            <div id="messages-container"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="输入指令或提问..."></textarea>
                    <button id="send-btn">发送</button>
                    <button id="asr-btn" title="语音输入">🎤</button>
                </div>
            </div>
        </div>

        <!-- 包管理视图 -->
        <div class="package-manager-view" id="package-manager-view">
            <!-- 1. 增加筛选标签 -->
            <div class="pkg-filter-tabs">
                <div class="pkg-tab active" id="tab-installed">已安装</div>
                <div class="pkg-tab" id="tab-all">所有软件包</div>
            </div>

            <div class="pkg-toolbar">
                <input type="text" class="pkg-search-input" id="pkg-search-input" placeholder="搜索软件包...">
                <button class="new-chat-btn" style="margin:0" id="refresh-pkg-btn">刷新</button>
                <div id="pkg-manager-tag" style="font-size: 10px; color: #666; padding: 0 10px;">检测中...</div>
            </div>

            <div class="pkg-content">
                <div class="pkg-list-container">
                    <table class="pkg-table" id="pkg-table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>状态</th>
                                <th style="width: 40px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="pkg-list-body"></tbody>
                    </table>
                </div>
                <div class="pkg-detail-pane">
                    <div class="pkg-detail-header" id="detail-title">详情</div>
                    <pre id="pkg-detail-content">选择软件包查看信息</pre>
                    <!-- 2. 详情页快捷操作 -->
                    <div class="pkg-detail-actions" id="pkg-detail-actions" style="display:none;">
                        <button id="detail-install-btn" class="big-action-btn btn-install">＋ 安装</button>
                        <button id="detail-remove-btn" class="big-action-btn btn-remove">－ 卸载</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟 Vue 的响应式数据
        let state = {
            history: [],
            currentSessionIndex: 0,
            loading: false
        };

        const msgContainer = document.getElementById('messages-container');
        const historyListEl = document.getElementById('history-list');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 1. 初始化
        async function init() {
            state.history = await window.electronAPI.getHistory();
            if (state.history.length === 0) {
                createNewChat();
            }
            renderHistory();
            renderMessages();
        }

        // 2. 渲染历史记录侧边栏
        function renderHistory() {
            historyListEl.innerHTML = '';
            state.history.forEach((session, index) => {
                const div = document.createElement('div');
                div.className = `history-item ${state.currentSessionIndex === index ? 'active' : ''}`;

                const textSpan = document.createElement('span');
                textSpan.className = 'history-item-text';
                textSpan.innerText = session.title || '新会话 ' + (index + 1);
                textSpan.onclick = () => switchSession(index);
                div.appendChild(textSpan);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'history-item-delete';
                deleteBtn.innerText = '✕';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteSession(index);
                };
                div.appendChild(deleteBtn);

                historyListEl.appendChild(div);
            });
        }

        // 3. 渲染当前会话的消息
        function renderMessages() {
            msgContainer.innerHTML = '';
            const messages = state.history[state.currentSessionIndex]?.messages || [];
            messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            scrollToBottom();
        }

        // 4. 将单条消息添加到 UI
        function appendMessageUI(role, content) {
            if (!content)
                content = '';
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const isCode = content.includes('```');
            const avatar = role === 'user' ? '👤' : '🤖';

            let innerHTML = `
            <div class="avatar">${avatar}</div>
            <div class="content">
        `;

            if (isCode) {
                // 提取代码逻辑 (正则表达式)
                const code = content.replace(/```(sh|bash|shell)?/gi, '').replace(/```/g, '').trim();
                innerHTML += `
                <div class="code-block">
                    <div class="code-header">
                        <span>Shell Script</span>
                        <button onclick="executeScript(\`${code.replace(/`/g, '\\`')}\`)">⚡ 执行</button>
                    </div>
                    <pre><code>${code}</code></pre>
                </div>
            `;
            } else {
                innerHTML += `<div class="text-bubble">${content}</div>`;
            }

            innerHTML += `</div>`;
            msgDiv.innerHTML = innerHTML;
            msgContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        // 5. 交互功能
        async function send() {
            const text = userInput.value.trim();
            if (!text || state.loading) return;

            state.loading = true;
            sendBtn.disabled = true;

            // 更新本地状态
            state.history[state.currentSessionIndex].messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            userInput.value = '';

            // 调用识别用户需求并自动执行shell，返回执行情况 
            const response = await window.electronAPI.sendMessage({
                text: text,
                sessionId: state.currentSessionIndex,
                sessionCount: state.history.length
            });

            // 这里已经在监听中更新，无需再显示一遍
            // // 更新助手回复
            // state.history[state.currentSessionIndex].messages.push({ role: 'assistant', content: response });
            // appendMessageUI('assistant', response);

            // 如果是首条消息，更新标题
            if (state.history[state.currentSessionIndex].messages.length === 1) {
                state.history[state.currentSessionIndex].title = text.length > 5 ? `${text.substring(0, 5)}...` : text;
                renderHistory();
            }

            state.loading = false;
            sendBtn.disabled = false;
        }

        function createNewChat() {
            state.history.unshift({ title: '新会话', messages: [] });
            state.currentSessionIndex = 0;
            renderHistory();
            renderMessages();

            // 同步到main.js
            window.electronAPI.createSession();
        }

        function switchSession(index) {
            if (index < state.history.length && index >= 0) {
                state.currentSessionIndex = index;
                renderHistory();
                renderMessages();

                // 让后端更新sessionId
                window.electronAPI.sessionSwitch(index);
            } else {
                console.log(`index: ${index}, out of range!`);
            }
        }

        async function deleteSession(index) {
            if (index < 0 || index >= state.history.length) return;

            const session = state.history[index];
            if (confirm(`确认删除会话: "${session.title || '新会话 ' + (index + 1)}"?`)) {
                // 调用主进程删除
                const result = await window.electronAPI.deleteSession(index);

                if (result.success) {
                    // 本地删除
                    state.history.splice(index, 1);

                    // 调整当前会话索引
                    if (state.currentSessionIndex >= state.history.length) {
                        state.currentSessionIndex = Math.max(0, state.history.length - 1);
                    }

                    // 如果没有会话了，创建新的
                    if (state.history.length === 0) {
                        createNewChat();
                    } else {
                        renderHistory();
                        renderMessages();
                        window.electronAPI.sessionSwitch(state.currentSessionIndex);
                    }
                }
            }
        }

        window.executeScript = async (code) => {
            if (confirm("确认执行此脚本？\n\n" + code)) {
                await window.electronAPI.runCommand(code, state.currentSessionIndex);
            }
        };

        function scrollToBottom() {
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // 事件监听
        document.getElementById('new-chat-btn').onclick = createNewChat;
        sendBtn.onclick = send;
        userInput.onkeyup = (e) => { if (e.key === 'Enter') send(); };

        // ASR 按钮事件处理 - 长按开始录音，松开停止
        let asrPressTime = 0;
        const asrBtn = document.getElementById('asr-btn');

        asrBtn.addEventListener('mousedown', () => {
            asrPressTime = Date.now();
            asrBtn.classList.add('recording');
            asrBtn.textContent = '🔴';
            // 开始录音
            window.electronAPI.QuickListen(true, true);
        });

        const endAsr = () => {
            const pressDuration = Date.now() - asrPressTime;
            asrBtn.classList.remove('recording');
            asrBtn.textContent = '🎤';

            // 如果少于500ms，取消发送；否则停止并发送
            if (pressDuration < 500) {
                window.electronAPI.QuickListen(false, false); // 取消
            } else {
                window.electronAPI.QuickListen(true, false); // 停止并发送
            }
        };

        asrBtn.addEventListener('mouseup', endAsr);
        asrBtn.addEventListener('mouseleave', endAsr);


        // 监听来自语音识别的结果并填入输入框
        window.electronAPI.onUpdateStatus((data) => {
            if (data.role === 'voice-input') {
                // 语音识别结果追加到输入框（不清除原本内容）
                const currentContent = userInput.value.trim();
                if (currentContent) {
                    userInput.value = currentContent + '\n' + data.content;
                } else {
                    userInput.value = data.content;
                }
                userInput.focus(); // 自动聚焦，便于用户编辑
                // 关闭 ASR 按钮的录音状态
                if (asrBtn) {
                    asrBtn.classList.remove('recording');
                }
            } else if (data.role === 'ai') {
                // 其他AI回复可以作为日志显示在控制台
                console.log(data.content);
            }
        });

        const toggleBallBtn = document.getElementById('toggle-ball-btn');
        let isBallShowing = false;

        // 点击切换悬浮球显示
        toggleBallBtn.onclick = () => {
            isBallShowing = !isBallShowing;
            window.electronAPI.toggleBall(isBallShowing);
            updateBallBtnUI(isBallShowing);
        };

        // 监听来自主进程的悬浮球状态更新 (例如悬浮球被自己关闭了)
        window.electronAPI.onBallStatus((exists) => {
            isBallShowing = exists;
            updateBallBtnUI(exists);
        });

        function updateBallBtnUI(exists) {
            if (exists) {
                toggleBallBtn.innerText = '关闭悬浮球';
                toggleBallBtn.classList.add('active');
            } else {
                toggleBallBtn.innerText = '显示悬浮球';
                toggleBallBtn.classList.remove('active');
            }
        }

        // 响应ai返回
        window.electronAPI.onAiResponse(({ role, content, sessionId } = {}) => {
            console.log(`onAiResponse calling！role: ${role}, content: ${content}, sessionId: ${sessionId}`);

            // 添加历史记录
            if (state.history[sessionId]) {
                state.history[sessionId].messages.push({ role: role, content: content });
            }

            // 只在当前窗口渲染对话 UI
            if (sessionId === state.currentSessionIndex) {
                // 调用添加消息 UI 函数
                appendMessageUI(role, content);
                scrollToBottom();
            }

            // 如果标题变化，刷新侧边栏标题
            renderHistory();
        });

        window.electronAPI.onAskPermission(async (data) => {
            const { requestId, type, message, command } = data;

            console.log(`收到权限请求: ${type}, ID: ${requestId}`);

            let result;

            if (type === 'sudo-password') {
                // 显示密码输入对话框（传递 command 以显示要执行的命令）
                result = await showSudoPasswordDialog(message, command);
            } else if (type === 'run-confirmation') {
                // 显示命令确认对话框
                result = await showRunConfirmationDialog(message, command);
            } else {
                // 其他类型的权限请求
                result = await showMyCustomDialog(message || `是否允许访问 ${type}?`);
            }

            // 将结果发回主进程，必须带上 requestId
            window.electronAPI.sendPermissionResponse({
                requestId: requestId,
                result: result // 密码字符串或 boolean
            });
        });

        async function showRunConfirmationDialog(message, command) {
            return new Promise((resolve) => {
                const backdrop = document.createElement('div');
                backdrop.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.5);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                `;

                const dialog = document.createElement('div');
                dialog.style.cssText = `
                    background: #2d2d2d;
                    border: 1px solid #444;
                    border-radius: 8px;
                    padding: 24px;
                    width: 500px;
                    max-height: 70vh;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
                    color: #ccc;
                    font-family: 'Segoe UI', sans-serif;
                    overflow-y: auto;
                `;

                dialog.innerHTML = `
                    <div>
                        <h2 style="margin: 0 0 16px 0; color: #fff; font-size: 18px;">⚡ 命令确认</h2>
                        <p style="margin: 0 0 12px 0; color: #aaa; font-size: 13px;">${message}</p>
                        
                        <div style="background: #1e1e1e; border: 1px solid #444; border-radius: 4px; padding: 12px; margin-bottom: 16px;">
                            <div style="font-size: 11px; color: #888; margin-bottom: 8px;">将执行的命令:</div>
                            <code style="
                                display: block;
                                color: #d7ba7d;
                                font-family: 'Fira Code', monospace;
                                font-size: 12px;
                                word-break: break-all;
                                white-space: pre-wrap;
                                overflow-x: auto;
                            ">${command}</code>
                        </div>
                        
                        <div style="background: #3a2a2a; border-left: 3px solid #f39c12; padding: 12px; border-radius: 4px; margin-bottom: 16px;">
                            <p style="margin: 0; color: #ffcc99; font-size: 13px;">⚠️ 请确保你信任此命令的来源</p>
                            <p style="margin: 5px 0 0 0; color: #ccc; font-size: 11px;">执行未知命令可能导致系统损坏</p>
                        </div>
                        
                        <div style="display: flex; gap: 12px;">
                            <button id="runConfirmBtn" style="
                                flex: 1;
                                padding: 10px 16px;
                                background: #27ae60;
                                color: white;
                                border: none;
                                border-radius: 4px;
                                cursor: pointer;
                                font-size: 14px;
                                font-weight: 500;
                            ">执行</button>
                            <button id="runCancelBtn" style="
                                flex: 1;
                                padding: 10px 16px;
                                background: #444;
                                color: #ccc;
                                border: none;
                                border-radius: 4px;
                                cursor: pointer;
                                font-size: 14px;
                            ">取消</button>
                        </div>
                    </div>
                `;

                backdrop.appendChild(dialog);
                document.body.appendChild(backdrop);

                const confirmBtn = dialog.querySelector('#runConfirmBtn');
                const cancelBtn = dialog.querySelector('#runCancelBtn');

                const cleanup = () => {
                    backdrop.remove();
                };

                confirmBtn.onclick = () => {
                    cleanup();
                    resolve(true);
                };

                cancelBtn.onclick = () => {
                    cleanup();
                    resolve(false);
                };

                // Escape 取消
                const handleKeyUp = (e) => {
                    if (e.key === 'Escape') {
                        backdrop.removeEventListener('keyup', handleKeyUp);
                        cleanup();
                        resolve(false);
                    }
                };
                backdrop.addEventListener('keyup', handleKeyUp);
                backdrop.focus();
            });
        }

        async function showSudoPasswordDialog(message, command) {
            return new Promise((resolve) => {
                // 创建模态对话框
                const backdrop = document.createElement('div');
                backdrop.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.5);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                `;

                const dialog = document.createElement('div');
                dialog.style.cssText = `
                    background: #2d2d2d;
                    border: 1px solid #444;
                    border-radius: 8px;
                    padding: 24px;
                    width: 450px;
                    max-height: 70vh;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
                    color: #ccc;
                    font-family: 'Segoe UI', sans-serif;
                    overflow-y: auto;
                `;

                let commandDisplay = '';
                if (command) {
                    commandDisplay = `
                        <div style="background: #1e1e1e; border: 1px solid #444; border-radius: 4px; padding: 12px; margin-bottom: 16px;">
                            <div style="font-size: 11px; color: #888; margin-bottom: 8px;">将执行的命令:</div>
                            <code style="
                                display: block;
                                color: #d7ba7d;
                                font-family: 'Fira Code', monospace;
                                font-size: 12px;
                                word-break: break-all;
                                white-space: pre-wrap;
                                overflow-x: auto;
                            ">${command}</code>
                        </div>
                    `;
                }

                dialog.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <h2 style="margin: 0 0 12px 0; color: #fff; font-size: 18px;">🔐 需要管理员密码</h2>
                        <div style="background: #3a2a2a; border-left: 3px solid #e74c3c; padding: 12px; border-radius: 4px; margin-bottom: 16px;">
                            <p style="margin: 0; color: #ffaaaa; font-size: 13px;">⚠️ 仅在信任的命令中输入密码</p>
                            <p style="margin: 8px 0 0 0; color: #ccc; font-size: 12px;">此操作需要 sudo 权限</p>
                        </div>
                        ${commandDisplay}
                        <p style="margin: 0; color: #ccc; font-size: 14px;">${message}</p>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <label style="display: block; margin-bottom: 8px; font-size: 13px; color: #aaa;">密码:</label>
                        <input type="password" id="sudoPasswordInput" style="
                            width: 100%;
                            padding: 8px 12px;
                            background: #1e1e1e;
                            border: 1px solid #444;
                            border-radius: 4px;
                            color: #ccc;
                            font-family: monospace;
                            box-sizing: border-box;
                        " placeholder="输入你的系统密码">
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button id="sudoSubmitBtn" style="
                            flex: 1;
                            padding: 8px 16px;
                            background: #e74c3c;
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 14px;
                            font-weight: 500;
                        ">提交</button>
                        <button id="sudoCancelBtn" style="
                            flex: 1;
                            padding: 8px 16px;
                            background: #444;
                            color: #ccc;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 14px;
                        ">取消</button>
                    </div>
                `;

                backdrop.appendChild(dialog);
                document.body.appendChild(backdrop);

                const passwordInput = dialog.querySelector('#sudoPasswordInput');
                const submitBtn = dialog.querySelector('#sudoSubmitBtn');
                const cancelBtn = dialog.querySelector('#sudoCancelBtn');

                const cleanup = () => {
                    backdrop.remove();
                };

                const handleSubmit = () => {
                    const password = passwordInput.value;
                    cleanup();
                    resolve(password || null); // 返回密码或 null
                };

                const handleCancel = () => {
                    cleanup();
                    resolve(null); // 返回 null 表示用户取消
                };

                submitBtn.onclick = handleSubmit;
                cancelBtn.onclick = handleCancel;

                // 回车提交
                passwordInput.onkeyup = (e) => {
                    if (e.key === 'Enter') handleSubmit();
                    if (e.key === 'Escape') handleCancel();
                };

                // 自动聚焦输入框
                setTimeout(() => passwordInput.focus(), 100);
            });
        }

        async function showMyCustomDialog(msg) {
            // 这里可以是你的 Vue/React 组件或简单的 confirm
            return confirm(msg);
        }

        // 在 state 中增加包管理状态
        state.packages = [];
        state.selectedPkg = null;

        // 视图切换逻辑
        const chatView = document.getElementById('main-chat-view');
        const pkgView = document.getElementById('package-manager-view');
        const chatSidebarParts = document.getElementById('chat-sidebar-parts');

        document.getElementById('show-chat-btn').onclick = () => {
            chatView.style.display = 'flex';
            pkgView.style.display = 'none';
            chatSidebarParts.style.display = 'block';
            document.getElementById('show-chat-btn').classList.add('active');
            document.getElementById('show-pkg-btn').classList.remove('active');
        };

        document.getElementById('show-pkg-btn').onclick = async () => {
            chatView.style.display = 'none';
            pkgView.style.display = 'flex';
            chatSidebarParts.style.display = 'none';
            document.getElementById('show-pkg-btn').classList.add('active');
            document.getElementById('show-chat-btn').classList.remove('active');
            // 获取当前包管理器名称并显示
            const managerName = await window.electronAPI.getPkgManagerName();
            document.getElementById('pkg-manager-tag').innerText = `后端: ${managerName}`;

            loadPackages(); // 切换时加载
        };

        async function handleSearchOrLoad() {
            const query = document.getElementById('pkg-search-input').value.trim().toLowerCase();
            const tbody = document.getElementById('pkg-list-body');

            if (state.pkgMode === 'installed') {
                // 【已安装模式】：直接从内存缓存 state.packages 中过滤
                // 这样可以实现毫秒级响应，无需调用后台
                const filtered = state.packages.filter(p =>
                    p.name.toLowerCase().includes(query) ||
                    (p.description && p.description.toLowerCase().includes(query))
                );
                renderPkgList(filtered);
            } else {
                // 【所有包模式】：必须调用后台包管理器搜索
                if (query.length < 2) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#666; padding:20px;">请输入至少 2 个字符进行全库搜索...</td></tr>';
                    return;
                }

                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#666; padding:20px;">正在云端仓库搜索...</td></tr>';
                const results = await window.electronAPI.searchPkgs(query);
                renderPkgList(results);
            }
        }

        // 获取系统真实的已安装列表并同步到缓存
        async function loadPackages() {
            const managerTag = document.getElementById('pkg-manager-tag');
            managerTag.innerText = "正在扫描系统...";

            // 从后端获取
            const pkgs = await window.electronAPI.getInstalledPkgs();

            // 更新缓存
            state.packages = pkgs;
            state.installedNames = new Set(pkgs.map(p => p.name));

            managerTag.innerText = `后端: ${await window.electronAPI.getPkgManagerName()} (${pkgs.length} 已安装)`;

            // 执行当前模式下的渲染
            handleSearchOrLoad();
        }

        // 选择包查看详情
        async function selectPkg(pkg, trElement) {
            // 样式切换
            document.querySelectorAll('.pkg-table tr').forEach(r => r.classList.remove('selected'));
            trElement.classList.add('selected');

            const detailContent = document.getElementById('pkg-detail-content');
            detailContent.innerText = '正在获取详情...';

            const info = await window.electronAPI.getPkgInfo(pkg.name);
            detailContent.innerText = info;
            document.querySelector('.pkg-detail-header').innerText = pkg.name;
        }

        // 负责将数组内容转为 HTML，并根据 Set 自动判断安装状态
        function renderPkgList(displayList) {
            const tbody = document.getElementById('pkg-list-body');
            tbody.innerHTML = '';

            if (displayList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#666; padding:20px;">无匹配结果</td></tr>';
                return;
            }

            displayList.forEach(pkg => {
                // 关键：从 Set 中检查该包是否已安装 (用于在“所有”模式下显示状态)
                const isInstalled = state.installedNames.has(pkg.name);

                const tr = document.createElement('tr');
                tr.innerHTML = `
            <td>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="color:var(--text-bright)">${pkg.name}</span>
                    ${isInstalled ? '<span class="status-tag installed">已安装</span>' : ''}
                </div>
                <div style="font-size:11px; color:var(--text-dim); margin-top:2px;">${pkg.description || ''}</div>
            </td>
            <td style="color:var(--text-dim); font-family:monospace; font-size:12px;">${pkg.version || '--'}</td>
            <td style="text-align:center;">
                ${isInstalled ?
                        `<button class="pkg-action-btn btn-remove" onclick="handlePkgAction('${pkg.name}', 'remove')">－</button>` :
                        `<button class="pkg-action-btn btn-install" onclick="handlePkgAction('${pkg.name}', 'install')">＋</button>`
                    }
            </td>
        `;
                tr.onclick = () => selectPkg(pkg, tr);
                tbody.appendChild(tr);
            });
        }

        // TODO: 现在如果输入密码有误，无法在下次触发窗口；
        // TODO: 现在无法正常安装卸载
        // 处理安装和卸载
        window.handlePkgAction = async (name, action) => {
            event.stopPropagation(); // 防止触发 tr 的 onclick

            const confirmMsg = action === 'install' ? `确认安装 ${name}？` : `确认卸载 ${name}？`;
            if (!confirm(confirmMsg)) return;

            // 获取对应的 shell 指令
            const command = action === 'install' ?
                await window.electronAPI.installPkg(name) :
                await window.electronAPI.removePkg(name);

            // 切换到 AI 对话视图查看进度，或者直接静默执行
            // 这里我们使用你现有的 runCommand 逻辑，它会自动处理 sudo 弹窗
            alert(`指令已发送到终端: ${command}\n执行完成后请手动点击刷新。`);

            await window.electronAPI.runCommand(command, state.currentSessionIndex);

            // 提示用户刷新
            setTimeout(() => {
                if (confirm("执行可能已完成，是否刷新包列表？")) loadPackages();
            }, 5000);
        };

        // 修改 selectPkg 显示操作按钮
        async function selectPkg(pkg, trElement) {
            document.querySelectorAll('.pkg-table tr').forEach(r => r.classList.remove('selected'));
            trElement.classList.add('selected');

            const detailContent = document.getElementById('pkg-detail-content');
            const actionsDiv = document.getElementById('pkg-detail-actions');
            detailContent.innerText = '正在读取详情...';
            actionsDiv.style.display = 'none';

            const info = await window.electronAPI.getPkgInfo(pkg.name);
            detailContent.innerText = info;
            document.getElementById('detail-title').innerText = pkg.name;

            // 显示对应的按钮
            actionsDiv.style.display = 'flex';
            const isInstalled = state.installedNames.has(pkg.name);
            document.getElementById('detail-install-btn').style.display = isInstalled ? 'none' : 'flex';
            document.getElementById('detail-remove-btn').style.display = isInstalled ? 'flex' : 'none';

            // 绑定详情页按钮事件
            document.getElementById('detail-install-btn').onclick = () => window.handlePkgAction(pkg.name, 'install');
            document.getElementById('detail-remove-btn').onclick = () => window.handlePkgAction(pkg.name, 'remove');
        }

        document.getElementById('refresh-pkg-btn').onclick = loadPackages;
        // 扩展 state
        state.pkgMode = 'installed'; // 'installed' 或 'all'
        state.installedNames = new Set(); // 用于快速比对是否已安装

        // 搜索框防抖处理
        let searchTimer;
        document.getElementById('pkg-search-input').oninput = () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(handleSearchOrLoad, 400); // 400ms 防抖
        };

        // 标签切换
        document.getElementById('tab-installed').onclick = function () {
            state.pkgMode = 'installed';
            this.classList.add('active');
            document.getElementById('tab-all').classList.remove('active');
            document.getElementById('pkg-search-input').placeholder = "在已安装的包中搜索...";
            handleSearchOrLoad();
        };

        document.getElementById('tab-all').onclick = function () {
            state.pkgMode = 'all';
            this.classList.add('active');
            document.getElementById('tab-installed').classList.remove('active');
            document.getElementById('pkg-search-input').placeholder = "在云端仓库中搜索新软件包...";
            handleSearchOrLoad();
        };

        init();
    </script>
</body>

</html>
